<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3 日文單字記憶</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- 引入單字庫 -->
    <script src="data.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 頂部資訊列 -->
        <header class="header">
            <h1 class="logo">N3 Vocabulary</h1>
            <div class="stats" id="stats-display">
                <div class="stat-item">
                    <span class="stat-label">待複習:</span>
                    <span class="stat-value" id="stat-reviewCount">0</span>
                </div>
            </div>
        </header>

        <!-- 主視圖容器 -->
        <main class="main-content">
            <!-- 視圖 1: 歡迎首頁 -->
            <section id="view-dashboard" class="view active">
                <div class="dashboard-card glass-panel">
                    <h2>今日學習摘要</h2>
                    <div class="dashboard-stats">
                        <div class="d-stat">
                            <div class="d-val" id="d-total">0</div>
                            <div class="d-label">總收集字數</div>
                        </div>
                        <div class="d-stat highlight">
                            <div class="d-val" id="d-due">0</div>
                            <div class="d-label">今日待複習</div>
                        </div>
                    </div>
                    <button class="btn primary-btn" id="start-btn">開始複習</button>
                    


                    <button class="btn secondary-btn" id="reset-btn" style="margin-top: 10px; opacity: 0.5;">重置進度預覽</button>
                </div>
            </section>

            <!-- 視圖 2: 學習介面 -->
            <section id="view-study" class="view hidden">
                <div class="progress-bar">
                    <div class="progress-fill" id="study-progress"></div>
                </div>
                <div class="progress-text" id="study-progress-text">1 / 30</div>

                <!-- 卡片容器 -->
                <div class="scene scene--card">
                    <div class="card" id="flashcard">
                        <!-- 正面 -->
                        <div class="card__face card__face--front">
                            <div class="card-content">
                                <h2 class="kanji" id="card-kanji-front">-</h2>
                                <div class="click-hint">點擊翻轉查看解答</div>
                            </div>
                        </div>
                        <!-- 背面 -->
                        <div class="card__face card__face--back">
                            <div class="card-content">
                                <h2 class="kanji" id="card-kanji-back">-</h2>
                                <p class="reading" id="card-reading">-</p>
                                <div class="divider"></div>
                                <p class="meaning" id="card-meaning">-</p>
                                <span class="pos-tag" id="card-pos">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 動作按鈕 -->
                <div class="action-panel" id="action-panel">
                    <button class="action-btn btn-hard" data-rating="Hard">
                        <span class="rating-label">困難</span>
                        <span class="rating-time" id="time-hard">-</span>
                    </button>
                    <button class="action-btn btn-good" data-rating="Good">
                        <span class="rating-label">正常</span>
                        <span class="rating-time" id="time-good">-</span>
                    </button>
                    <button class="action-btn btn-easy" data-rating="Easy">
                        <span class="rating-label">簡單</span>
                        <span class="rating-time" id="time-easy">-</span>
                    </button>
                </div>
            </section>

            <!-- 視圖 3: 任務完成介面 -->
            <section id="view-done" class="view hidden">
                <div class="done-card glass-panel">
                    <div class="celebration-icon">🎉</div>
                    <h2>恭喜完成！</h2>
                    <p>您已完成今日的所有複習任務。</p>
                    <button class="btn primary-btn" id="home-btn">返回首頁</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
